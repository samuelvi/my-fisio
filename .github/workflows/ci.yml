name: CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

# Global environment variables
env:
  COMPOSE_FILE: docker/test/docker-compose.yaml

jobs:
  # ============================================================================
  # Backend Tests (PHPUnit + Quality Checks)
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # --- Setup ---
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Caching ---
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/test/php/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # --- Build Infrastructure ---
      - name: Build PHP image with cache
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load -t test-php_test:latest \
            -f docker/test/php/Dockerfile \
            docker/test/php

          # Rotate cache to prevent bloat
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start services
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for services to be healthy
        run: |
          echo "⏳ Waiting for MariaDB..."
          timeout 90s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} test_physiotherapy_mariadb)" == "healthy" ]; do sleep 3; done'
          echo "✅ MariaDB ready"

          echo "⏳ Waiting for Redis..."
          timeout 30s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} test_physiotherapy_redis)" == "healthy" ]; do sleep 2; done'
          echo "✅ Redis ready"

          docker compose -f ${{ env.COMPOSE_FILE }} ps

      # --- Dependencies ---
      - name: Install Composer dependencies
        run: |
          docker compose -f docker/test/docker-compose.yaml exec -T php_test git config --global --add safe.directory /var/www/html
          docker compose -f docker/test/docker-compose.yaml exec -T php_test \
            composer install --no-interaction --prefer-dist --optimize-autoloader

      # --- Setup ---
      - name: Generate JWT keys
        run: |
          docker compose -f docker/test/docker-compose.yaml exec -T php_test mkdir -p config/jwt
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Setup database
        run: |
          echo "🗄️  Resetting database..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:schema:drop --force --full-database
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:schema:create
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:fixtures:load --no-interaction
          echo "✅ Database ready"

      # --- Quality Checks ---
      - name: PHP CS Fixer
        continue-on-error: true
        run: |
          echo "🔍 Running PHP CS Fixer..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test vendor/bin/php-cs-fixer fix --dry-run --diff || echo "⚠️  Style issues found"

      - name: PHPStan (Level 8)
        continue-on-error: true
        run: |
          echo "🔍 Running PHPStan..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test vendor/bin/phpstan analyse src --level=8 || echo "⚠️  Type errors found"

      # --- Tests ---
      - name: PHPUnit Tests
        run: |
          echo "🧪 Running PHPUnit tests..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/phpunit

      # --- Cleanup ---
      - name: Stop containers
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v

  # ============================================================================
  # E2E Tests (Playwright)
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: backend-tests

    steps:
      # --- Setup ---
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Caching ---
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docker/test/php/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      # --- Build Infrastructure ---
      - name: Build PHP image with cache
        run: |
          docker buildx build \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --load -t test-php_test:latest \
            -f docker/test/php/Dockerfile \
            docker/test/php

      - name: Start services
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d
        env:
          DOCKER_BUILDKIT: 1

      - name: Wait for services to be healthy
        run: |
          timeout 90s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} test_physiotherapy_mariadb)" == "healthy" ]; do sleep 3; done'
          timeout 30s bash -c 'until [ "$(docker inspect -f {{.State.Health.Status}} test_physiotherapy_redis)" == "healthy" ]; do sleep 2; done'

      # --- Dependencies ---
      - name: Install Composer dependencies
        run: |
          docker compose -f docker/test/docker-compose.yaml exec -T php_test git config --global --add safe.directory /var/www/html
          docker compose -f docker/test/docker-compose.yaml exec -T php_test \
            composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # --- Setup ---
      - name: Generate JWT keys
        run: |
          docker compose -f docker/test/docker-compose.yaml exec -T php_test mkdir -p config/jwt
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Setup database with fixtures
        run: |
          echo "🗄️  Setting up database..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:schema:drop --force --full-database
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:schema:create
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console doctrine:fixtures:load --no-interaction

      - name: Dump exposed routes
        run: |
          echo "🗺️ Dumping exposed routes..."
          docker compose -f docker/test/docker-compose.yaml exec -T php_test php bin/console fos:js-routing:dump --format=json --target=assets/routing/routes.json

      - name: Build frontend assets
        run: |
          echo "⚡ Building with Vite..."
          npm run build:test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # --- Tests ---
      - name: Generate BDD tests
        run: |
          echo "🧩 Generating BDD tests..."
          npx bddgen

      - name: Run Playwright E2E tests
        run: |
          echo "🎭 Running E2E tests..."
          mkdir -p var/log/playwright
          npx playwright test --reporter=html,line,json,junit
        env:
          CI: true
          PLAYWRIGHT_HTML_OUTPUT_DIR: var/log/playwright/report
          PLAYWRIGHT_JSON_OUTPUT_NAME: var/log/playwright/playwright-results.json
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: var/log/playwright/playwright-results.xml

      - name: Summarize Playwright failures
        if: always()
        run: |
          {
            echo "## Playwright E2E summary"
            if [ -f var/log/playwright/playwright-results.json ]; then
              node -e 'const fs = require("fs");
              const data = JSON.parse(fs.readFileSync("var/log/playwright/playwright-results.json", "utf8"));
              const failures = [];
              const walk = (suite, path = []) => {
                const suites = suite.suites || [];
                for (const childSuite of suites) {
                  walk(childSuite, path.concat(childSuite.title || ""));
                }
                const specs = suite.specs || [];
                for (const spec of specs) {
                  for (const test of spec.tests || []) {
                    for (const result of test.results || []) {
                      if (result.status === "failed" || result.status === "timedOut") {
                        const location = (spec.file || "unknown") + ":" + ((spec.line || 0) + 1);
                        const titlePath = path.concat(spec.title).filter(Boolean).join(" > ");
                        const err = (result.error && result.error.message)
                          ? result.error.message.split("\\n")[0]
                          : "No error message";
                        failures.push({ location, titlePath, err });
                      }
                    }
                  }
                }
              };
              walk(data.suites ? { suites: data.suites } : data);
              if (failures.length === 0) {
                console.log("✅ All Playwright tests passed");
              } else {
                console.log("❌ Failed tests: " + failures.length);
                console.log("");
                for (const failure of failures.slice(0, 20)) {
                  console.log("- " + failure.titlePath);
                  console.log("  - File: " + failure.location);
                  console.log("  - Error: " + failure.err);
                }
                if (failures.length > 20) {
                  console.log("- ... and " + (failures.length - 20) + " more");
                }
              }'
            else
              echo "⚠️ var/log/playwright/playwright-results.json was not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Artifacts ---
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            var/log/playwright/report/
            playwright-report/
          retention-days: 14

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: var/log/playwright/test-results/**/*.png
          retention-days: 7

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-raw-results
          path: |
            var/log/playwright/playwright-results.json
            var/log/playwright/playwright-results.xml
            var/log/playwright/test-results/**/*
          if-no-files-found: warn
          retention-days: 14

      # --- Cleanup ---
      - name: Stop containers
        if: always()
        run: docker compose -f ${{ env.COMPOSE_FILE }} down -v
